name: Accupass 票券監看

# 觸發時機
on:
  schedule:
    # GitHub 排程實際會被降速到數小時才跑一次，所以這裡只當「重啟器」：
    # 每次被觸發後，單一執行會在內部自己每 60 秒檢查一圈、連續跑數小時（見下方 env）。
    - cron: "*/5 * * * *"
  # 也可以到 Actions 分頁手動按「Run workflow」立即測試
  workflow_dispatch:
    inputs:
      force_test:
        description: "送一則測試通知到 Discord（確認手機收得到，不檢查票況）"
        type: boolean
        default: false
      loop_minutes:
        description: "本次最多連續跑幾分鐘（留空＝預設 330。測試時可填 3，會很快結束、log 立刻看得到）"
        type: string
        default: ""

# 同時只允許一個監看在跑：長跑進行中時，新觸發會排隊等它結束再接力，避免疊一堆。
concurrency:
  group: ticket-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # 容許單次連續跑約 5.5 小時（GitHub 單一 job 上限 6 小時）
    timeout-minutes: 350
    steps:
      # 1. 把 repo 的程式碼抓下來
      - name: 取得程式碼
        uses: actions/checkout@v4

      # 2. 準備 Python 環境
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. 安裝相依套件 + 下載瀏覽器核心
      - name: 安裝套件與瀏覽器
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # 4. 執行監看腳本（DISCORD_WEBHOOK_URL 從 GitHub Secret 帶進來）
      - name: 執行票券監看
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 手動觸發時若勾選 force_test，就送測試通知（排程自動跑時為空、照常檢查票況）
          FORCE_TEST: ${{ inputs.force_test }}
          # Loop 模式：每 60 秒檢查一圈，單次最多連續跑 N 分鐘後結束、交給下一次接力。
          # 手動觸發可用 loop_minutes 覆寫（留空/排程時 = 330 分鐘）。
          LOOP_INTERVAL_SECONDS: "60"
          LOOP_MAX_MINUTES: ${{ inputs.loop_minutes || '330' }}
        run: python watch_ticket.py

      # 5. 自我接力：這一棒結束時，用 PAT 立刻觸發下一棒，避免「等 GitHub 排程」的數小時空檔。
      #    - 只在「正常長跑」時接力；force_test 或短測試(loop_minutes)不接力。
      #    - if: always() → 即使上面逾時/出錯也照常接力，監看不中斷。
      #    - 沒設 WATCHER_PAT 時自動略過（不報錯），仍可手動/排程啟動。
      #    - 想完全停止：到 Actions 把這個 workflow Disable，接力觸發就會失效。
      - name: 接力啟動下一棒（消除空檔）
        if: ${{ always() && github.event.inputs.force_test != 'true' && github.event.inputs.loop_minutes == '' }}
        env:
          GH_TOKEN: ${{ secrets.WATCHER_PAT }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            echo "用 PAT 接力觸發下一棒監看..."
            gh workflow run watch.yml --repo "${{ github.repository }}"
          else
            echo "（未設定 WATCHER_PAT，略過自我接力；目前仍依賴 GitHub 排程，可能有空檔）"
          fi
